<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>Da Hood Codes — Xenomorph QR Engine v3.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PLANET KOSMOS font (stavi KOSMOS.ttf u isti folder ako želiš pravi font) -->
  <style>
    @font-face {
      font-family: "PlanetKosmos";
      src: url("KOSMOS.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #050816 0, #02030a 40%, #000000 100%);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(120, 255, 200, 0.18) 0, transparent 55%),
        radial-gradient(circle at 80% 10%, rgba(255, 0, 180, 0.18) 0, transparent 55%),
        radial-gradient(circle at 50% 90%, rgba(0, 180, 255, 0.18) 0, transparent 55%);
      opacity: 0.7;
      mix-blend-mode: screen;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      padding: 20px;
    }

    .card {
      background: radial-gradient(circle at top left, #0b1020 0, #050712 40%, #020308 100%);
      border-radius: 22px;
      border: 1px solid rgba(120, 255, 200, 0.35);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.9),
        0 0 60px rgba(120, 255, 200, 0.25);
      padding: 22px 24px 20px;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 0, 180, 0.12) 0, transparent 55%),
        radial-gradient(circle at 100% 0%, rgba(0, 200, 255, 0.12) 0, transparent 55%);
      opacity: 0.7;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: contents;
    }

    @media (max-width: 900px) {
      .card {
        grid-template-columns: 1fr;
      }
    }

    .title-block {
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(120, 255, 200, 0.08);
      border: 1px solid rgba(120, 255, 200, 0.5);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #78ffc8;
      margin-bottom: 10px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #78ffc8;
      box-shadow: 0 0 10px #78ffc8;
    }

    .title-main {
      font-family: "PlanetKosmos", system-ui, sans-serif;
      font-size: 32px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #ff4fd8, #5cf9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .title-sub {
      font-family: "PlanetKosmos", system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9ae6ff;
      opacity: 0.9;
    }

    .ribbon {
      margin-top: 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #e5ffe9;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .ribbon span {
      color: #78ffc8;
    }

    label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #b0b0c8;
      display: block;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(3, 5, 15, 0.9);
      color: #f5f5f5;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
    }

    textarea:focus {
      border-color: #78ffc8;
      box-shadow: 0 0 0 1px rgba(120, 255, 200, 0.4);
    }

    .hint {
      font-size: 11px;
      color: #8f9bb8;
      margin-top: 4px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
      margin-bottom: 10px;
    }

    .row > div {
      flex: 1 1 120px;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(3, 5, 15, 0.9);
      color: #f5f5f5;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #78ffc8;
      box-shadow: 0 0 0 1px rgba(120, 255, 200, 0.4);
    }

    .preset-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    .preset-pill {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(5, 7, 18, 0.9);
      padding: 5px 11px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #d0d0ff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .preset-pill.active {
      border-color: rgba(120, 255, 200, 0.9);
      background: radial-gradient(circle at top, rgba(120, 255, 200, 0.25), rgba(5, 7, 18, 0.9));
      color: #78ffc8;
    }

    .preset-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

      display: flex;
      flex-wrap
