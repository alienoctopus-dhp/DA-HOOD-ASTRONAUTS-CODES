<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title><h1>DA HOOD ASTRONAUTS</h1>
<h2>OFFICIAL QR PORTAL GENERATOR</h2>

  <style>
    body {
      background:#050510;
      color:#eee;
      font-family: system-ui, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:100vh;
      padding:20px;
    }
    h1 { margin-bottom:10px; text-align:center; }
    .box {
      background:#111326;
      border:1px solid #3b3f7a;
      border-radius:12px;
      padding:20px;
      max-width:420px;
      width:100%;
      box-shadow:0 0 25px rgba(0,255,200,0.15);
    }
    input {
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid #3b3f7a;
      background:#050510;
      color:#eee;
      margin-bottom:10px;
    }
    button {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      background:linear-gradient(135deg,#00ffc3,#7b5cff);
      color:#050510;
      font-weight:700;
      cursor:pointer;
      margin-bottom:15px;
    }
    button:hover { filter:brightness(1.1); }
    #qrcode {
      display:flex;
      justify-content:center;
      padding:10px;
      background:#050510;
      border-radius:12px;
    }
    small { opacity:0.7; display:block; margin-top:10px; text-align:center; }
  </style>
</head>
<body>
  <h1>Da Hood Codes — Xenomorph QR Engine v3.0</h1>

  <div class="box">
    <label for="text">URL / text za QR:</label>
    <input id="text" type="text" placeholder="https://web.facebook.com/DAHOODASTRONAUTS">

    <button id="make">ENCODE</button>

    <div id="qrcode"></div>

    <small>Scanaj QR kamerom na mobitelu. Ako si upisao link, otvorit će ga.</small>
  </div>

  <!-- QRCode library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const input = document.getElementById('text');
    const btn   = document.getElementById('make');
    const box   = document.getElementById('qrcode');

    let qr = new QRCode(box, {
      text: "",
      width: 256,
      height: 256,
      colorDark : "#00ffc3",
      colorLight : "#050510",
      correctLevel : QRCode.CorrectLevel.H
    });

    function makeQR() {
      const value = input.value.trim();
      if (!value) return;
      box.innerHTML = "";
      qr = new QRCode(box, {
        text: value,
        width: 256,
        height: 256,
        colorDark : "#00ffc3",
        colorLight : "#050510",
        correctLevel : QRCode.CorrectLevel.H
      });
    }

    btn.addEventListener('click', makeQR);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') makeQR();
    });
  </script>
</body>
</html>
