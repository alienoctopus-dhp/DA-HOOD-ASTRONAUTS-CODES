<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DA HOOD ASTRONAUTS — QR PORTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #000;
            color: #0aff0a;
            font-family: monospace;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #0aff0a;
            text-shadow: 0 0 10px #0aff0a;
        }

        #qrCanvas {
            margin-top: 20px;
            image-rendering: pixelated;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            background: #111;
            border: 1px solid #0aff0a;
            color: #0aff0a;
            font-family: monospace;
        }

        button:hover {
            background: #0aff0a;
            color: #000;
            cursor: pointer;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #0aff0a;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>DA HOOD ASTRONAUTS — QR PORTAL</h1>

    <input id="qrText" type="text" placeholder="Enter text or URL">
    <br>
    <button onclick="generateQR()">GENERATE QR</button>

    <div>
        <canvas id="qrCanvas"></canvas>
    </div>

    <footer>
        ALIEN OCTOPUS — DA HOOD PRODUCTION — DA HOOD ASTRONAUTS
    </footer>

    <script>
        function generateQR() {
            const text = document.getElementById("qrText").value;
            if (!text) return alert("Enter text first.");

            const canvas = document.getElementById("qrCanvas");
            const ctx = canvas.getContext("2d");

            const size = 300;
            canvas.width = size;
            canvas.height = size;

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, size, size);

            // Simple pseudo QR pattern (placeholder)
            for (let y = 0; y < size; y += 10) {
                for (let x = 0; x < size; x += 10) {
                    if (Math.random() > 0.5) {
                        ctx.fillStyle = "#0aff0a";
                        ctx.fillRect(x, y, 10, 10);
                    }
                }
            }

            // Save QR as PNG
            const link = document.createElement("a");
            link.download = "qr.png";
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>

</body>
</html>
