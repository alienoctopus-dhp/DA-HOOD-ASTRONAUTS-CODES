<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>DA HOOD ASTRONAUTS — QR PORTAL ENGINE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Planet Kosmos font – zamijeni URL s pravim pathom/fontom -->
  <style>
    @font-face {
      font-family: 'PlanetKosmos';
      src: url('PlanetKosmos.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg-color: #02030a;
      --panel-bg: rgba(5, 8, 25, 0.95);
      --accent1: #00f5ff;
      --accent2: #ff00ff;
      --accent3: #ff9a00;
      --text-main: #f5f5ff;
      --text-muted: #9ca3c7;
      --border-color: rgba(255, 255, 255, 0.2);
      --glow-color: rgba(0, 255, 255, 0.7);
      --danger: #ff3366;
      --success: #4ade80;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'PlanetKosmos', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1a1030 0, #02030a 55%, #000000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Zvjezdana pozadina */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20% 20%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 80% 30%, rgba(0,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,0,255,0.7), transparent),
        radial-gradient(2px 2px at 70% 60%, rgba(255,255,255,0.5), transparent);
      opacity: 0.6;
      pointer-events: none;
      z-index: -2;
    }

    /* Lebdeći emojiji – malo ubrzano */
    .floating-emoji {
      position: fixed;
      font-size: 32px;
      pointer-events: none;
      opacity: 0.8;
      animation: float 8s linear infinite;
      z-index: -1;
    }

    .floating-emoji:nth-child(1) { top: 10%; left: 8%; animation-duration: 7s; }
    .floating-emoji:nth-child(2) { top: 70%; left: 15%; animation-duration: 9s; }
    .floating-emoji:nth-child(3) { top: 20%; right: 10%; animation-duration: 8s; }
    .floating-emoji:nth-child(4) { bottom: 10%; right: 18%; animation-duration: 7.5s; }

    @keyframes float {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.7; }
      25% { transform: translateY(-20px) translateX(10px) rotate(5deg); opacity: 1; }
      50% { transform: translateY(0) translateX(20px) rotate(-5deg); opacity: 0.8; }
      75% { transform: translateY(-15px) translateX(-10px) rotate(3deg); opacity: 1; }
      100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.7; }
    }

    .app-shell {
      width: 100%;
      max-width: 1300px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 24px;
      background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 40px rgba(0,0,0,0.8),
        0 0 60px rgba(0,255,255,0.25),
        0 0 80px rgba(255,0,255,0.25);
      position: relative;
      overflow: hidden;
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 55%),
                  radial-gradient(circle at bottom right, rgba(255,0,255,0.12), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
      z-index: -1;
    }

    .left-panel,
    .right-panel {
      background: var(--panel-bg);
      border-radius: 18px;
      padding: 18px 18px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header {
      text-align: center;
      margin-bottom: 4px;
    }

    .title {
      font-size: 32px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00f5ff, #ff00ff, #ff9a00, #00f5ff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: rainbowTitle 6s linear infinite;
      text-shadow:
        0 0 12px rgba(0,255,255,0.8),
        0 0 22px rgba(255,0,255,0.7),
        0 0 32px rgba(255,154,0,0.7);
      margin-bottom: 4px;
    }

    @keyframes rainbowTitle {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .subtitle span {
      color: var(--accent1);
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent1);
      margin-bottom: 4px;
    }

    .form-group {
      margin-bottom: 8px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(3, 7, 18, 0.9);
      color: var(--text-main);
      font-size: 11px;
      font-family: inherit;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent1);
      box-shadow: 0 0 0 1px rgba(0,255,255,0.4);
      background: rgba(3, 7, 18, 1);
    }

    .inline-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .inline-row-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-row span {
      font-size: 10px;
      color: var(--text-muted);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--accent2);
      box-shadow: 0 0 8px rgba(255,0,255,0.7);
      cursor: pointer;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      background: rgba(3, 7, 18, 0.9);
      transition: all 0.15s ease;
    }

    .pill.active {
      border-color: var(--accent1);
      color: var(--accent1);
      box-shadow: 0 0 10px rgba(0,255,255,0.6);
      background: radial-gradient(circle at top, rgba(0,255,255,0.2), transparent 60%);
    }

    .color-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
