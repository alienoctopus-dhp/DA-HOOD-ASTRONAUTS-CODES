<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>Da Hood Codes — Xenomorph QR Engine v3.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- KOSMOS FONT (ako želiš pravi font, stavi KOSMOS.ttf u isti folder) -->
  <style>
    @font-face {
      font-family: "PlanetKosmos";
      src: url("KOSMOS.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #050816 0, #02030a 40%, #000000 100%);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(120, 255, 200, 0.18) 0, transparent 55%),
        radial-gradient(circle at 80% 10%, rgba(255, 0, 180, 0.18) 0, transparent 55%),
        radial-gradient(circle at 50% 90%, rgba(0, 180, 255, 0.18) 0, transparent 55%);
      opacity: 0.7;
      mix-blend-mode: screen;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      padding: 20px;
    }

    .card {
      background: radial-gradient(circle at top left, #0b1020 0, #050712 40%, #020308 100%);
      border-radius: 22px;
      border: 1px solid rgba(120, 255, 200, 0.35);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.9),
        0 0 60px rgba(120, 255, 200, 0.25);
      padding: 22px 24px 20px;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 0, 180, 0.12) 0, transparent 55%),
        radial-gradient(circle at 100% 0%, rgba(0, 200, 255, 0.12) 0, transparent 55%);
      opacity: 0.7;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: contents;
    }

    @media (max-width: 900px) {
      .card {
        grid-template-columns: 1fr;
      }
    }

    .title-block {
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(120, 255, 200, 0.08);
      border: 1px solid rgba(120, 255, 200, 0.5);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #78ffc8;
      margin-bottom: 10px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #78ffc8;
      box-shadow: 0 0 10px #78ffc8;
    }

    .title-main {
      font-family: "PlanetKosmos", system-ui, sans-serif;
      font-size: 32px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #ff4fd8, #5cf9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .title-sub {
      font-family: "PlanetKosmos", system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9ae6ff;
      opacity: 0.9;
    }
</head>
<body>
  <div class="bg-stars"></div>

  <div class="wrapper">
    <div class="card">
      <div class="card-inner">

        <!-- LEFT SIDE -->
        <div>
          <div class="title-block">
            <div class="badge">
              <div class="badge-dot"></div>
              Xenomorph QR Engine v3.0
            </div>

            <div class="title-main">Da Hood Codes</div>
            <div class="title-sub">Podrži Da Hood Astronauts misiju</div>

            <div class="ribbon">
              <span>Besplatno zavijenje</span> • no watermark • no limits
            </div>
          </div>

          <label for="qrText">Sadržaj QR koda</label>
          <textarea id="qrText">https://dahoodcodes.com</textarea>
          <div class="hint">
            URL, poruka, wallet, event, lokacija… šđčćž rade normalno.
          </div>

          <div class="preset-bar">
            <div class="preset-pill active" data-type="url">
              <div class="preset-dot"></div> URL
            </div>
            <div class="preset-pill" data-type="wifi">
              <div class="preset-dot"></div> WiFi
            </div>
            <div class="preset-pill" data-type="email">
              <div class="preset-dot"></div> Email
            </div>
            <div class="preset-pill" data-type="sms">
              <div class="preset-dot"></div> SMS
            </div>
            <div class="preset-pill" data-type="crypto">
              <div class="preset-dot"></div> Crypto
            </div>
            <div class="preset-pill" data-type="event">
              <div class="preset-dot"></div> Event
            </div>
          </div>

          <div class="row">
            <div>
              <label for="qrSize">Veličina (px)</label>
              <input type="number" id="qrSize" value="512" min="128" max="2048" step="32" />
            </div>

            <div>
              <label for="qrMargin">Margin</label>
              <input type="number" id="qrMargin" value="2" min="0" max="16" />
            </div>

            <div>
              <label for="qrLevel">Error level</label>
              <select id="qrLevel">
                <option value="L">L</option>
                <option value="M">M</option>
                <option value="Q">Q</option>
                <option value="H" selected>H</option>
              </select>
            </div>
          </div>

          <div class="buttons-main">
            <button class="btn-primary" id="btnGenerate">⚡ Encode / Refresh</button>
            <button class="btn-secondary" id="btnReset">♻ Reset</button>
          </div>

          <div class="export-bar">
            <button class="export-btn" data-format="png">PNG</button>
            <button class="export-btn" data-format="jpg">JPG</button>
            <button class="export-btn" data-format="svg" disabled>SVG</button>
            <button class="export-btn" data-format="copy">Copy</button>
            <button class="export-btn" data-format="print">Print</button>
          </div>

          <div class="donate-strip">
            <div class="donate-text">
              Podrži <span>Da Hood Astronauts</span> misiju — više besplatnih alata, više muzike, više kozmosa.
            </div>
            <button class="donate-btn" onclick="window.open('https://dahoodcodes.com', '_blank')">
              Donate
            </button>
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
          <div class="right-inner">
            <div class="qr-label">Live QR preview</div>

            <div class="qr-frame">
              <div id="qrcode"></div>
            </div>

            <div class="brand">
              DA HOOD <span>ASTRONAUTS</span> • CODES
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="footer">
      Xenomorph QR Engine v3.0 • Da Hood Astronauts edition
    </div>
  </div>

      <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    function getErrorLevel(level) {
      switch (level) {
        case "L": return QRCode.CorrectLevel.L;
        case "M": return QRCode.CorrectLevel.M;
        case "Q": return QRCode.CorrectLevel.Q;
        case "H":
        default: return QRCode.CorrectLevel.H;
      }
    }

    function fixEncoding(str) {
      try {
        return decodeURIComponent(escape(str));
      } catch (e) {
        return str;
      }
    }

    let qr;

    function generateQR() {
      const text = document.getElementById("qrText").value || "";
      const size = parseInt(document.getElementById("qrSize").value, 10) || 512;
      const margin = parseInt(document.getElementById("qrMargin").value, 10) || 2;
      const level = document.getElementById("qrLevel").value;

      const container = document.getElementById("qrcode");
      container.innerHTML = "";

      qr = new QRCode(container, {
        text: fixEncoding(text),
        width: size,
        height: size,
        correctLevel: getErrorLevel(level),
        margin: margin
      });
    }

    function downloadImage(format) {
      if (!qr) return;
      const canvas = document.querySelector("#qrcode canvas");
      const img = document.querySelector("#qrcode img");

      let dataURL = null;

      if (canvas && (format === "png" || format === "jpg")) {
        const mime = format === "jpg" ? "image/jpeg" : "image/png";
        dataURL = canvas.toDataURL(mime);
      } else if (img && format === "png") {
        dataURL = img.src;
      }

      if (!dataURL) return;

      const a = document.createElement("a");
      a.href = dataURL;
      a.download = "da-hood-astronauts-qr." + format;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function copyImage() {
      const canvas = document.querySelector("#qrcode canvas");
      if (!canvas || !navigator.clipboard || !navigator.clipboard.write) return;

      canvas.toBlob(async (blob) => {
        try {
          const item = new ClipboardItem({ "image/png": blob });
          await navigator.clipboard.write([item]);
        } catch (e) {
          console.log("Clipboard copy failed", e);
        }
      });
    }

    function printQR() {
      const canvas = document.querySelector("#qrcode canvas");
      const img = document.querySelector("#qrcode img");
      let dataURL = null;

      if (canvas) dataURL = canvas.toDataURL("image/png");
      else if (img) dataURL = img.src;
      if (!dataURL) return;

      const w = window.open("", "_blank");
      if (!w) return;
      w.document.write(
        "<!DOCTYPE html><html><head><title>Print QR</title></head><body style='margin:0;display:flex;align-items:center;justify-content:center;'><img src='" +
          dataURL +
          "' style='max-width:100%;max-height:100%;'/></body></html>"
      );
      w.document.close();
      w.focus();
      w.print();
    }

    function resetDefaults() {
      document.getElementById("qrText").value = "https://dahoodcodes.com";
      document.getElementById("qrSize").value = 512;
      document.getElementById("qrMargin").value = 2;
      document.getElementById("qrLevel").value = "H";
      setActivePreset("url");
      generateQR();
    }

    function setActivePreset(type) {
      document.querySelectorAll(".preset-pill").forEach((el) => {
        el.classList.toggle("active", el.dataset.type === type);
      });

      const textArea = document.getElementById("qrText");

      if (type === "url" && !textArea.value) {
        textArea.value = "https://dahoodcodes.com";
      } else if (type === "wifi") {
        textArea.value = "WIFI:T:WPA;S:DaHoodWiFi;P:lozinka123;;";
      } else if (type === "email") {
        textArea.value = "mailto:crew@dahoodcodes.com?subject=Da%20Hood%20Codes";
      } else if (type === "sms") {
        textArea.value = "sms:+385911234567?body=Da%20Hood%20Codes";
      } else if (type === "crypto") {
        textArea.value = "bitcoin:bc1qexamplewallet?amount=0.01";
      } else if (type === "event") {
        textArea.value = "BEGIN:VEVENT\nSUMMARY:Da Hood Astronauts Gathering\nLOCATION:Kosmos\nEND:VEVENT";
      }

      generateQR();
    }

    document.getElementById("btnGenerate").addEventListener("click", generateQR);
    document.getElementById("btnReset").addEventListener("click", resetDefaults);

    document.querySelectorAll(".preset-pill").forEach((el) => {
      el.addEventListener("click", () => setActivePreset(el.dataset.type));
    });

    document.querySelectorAll(".export-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const format = btn.dataset.format;
        if (format === "png" || format === "jpg") downloadImage(format);
        else if (format === "copy") copyImage();
        else if (format === "print") printQR();
      });
    });

    document.getElementById("qrText").addEventListener("input", generateQR);

    resetDefaults();
  </script>
</body>
</html>
