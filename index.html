<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Da Hood Astronauts — QR Portal Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Planet Kosmos (original) -->
  <style>
    @font-face {
      font-family: "PlanetKosmos";
      src: url("PLANETKOSMOS.ttf") format("truetype"),
           url("KOSMOS.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }
  </style>

  <style>
    :root {
      --bg-main: #02030a;
      --accent1: #5cf9ff;
      --accent2: #ff4fd8;
      --accent3: #78ffc8;
      --text-soft: #b7dfff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #0b1024 0%, #02030a 40%, #000000 100%);
      color: #e8faff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    /* floating cosmic icons */
    .float-icon {
      position: fixed;
      font-size: 22px;
      opacity: 0.45;
      animation: float 18s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    .float-icon.small { font-size: 16px; opacity: 0.35; }
    .float-icon.big { font-size: 30px; opacity: 0.55; }

    @keyframes float {
      0%   { transform: translate3d(0, 0, 0) rotate(0deg); }
      50%  { transform: translate3d(-20px, -40px, 0) rotate(6deg); }
      100% { transform: translate3d(10px, -80px, 0) rotate(-4deg); }
    }

    .header {
      text-align: center;
      margin-top: 30px;
      position: relative;
      z-index: 2;
    }

    .title-main {
      font-family: "PlanetKosmos", sans-serif;
      font-size: 40px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      background: linear-gradient(120deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(92, 249, 255, 0.4);
    }

    .title-sub {
      font-family: "PlanetKosmos", sans-serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9ae6ff;
      margin-top: 6px;
    }

    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      font-family: "PlanetKosmos", sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      cursor: pointer;
      color: var(--accent3);
      z-index: 3;
      text-transform: uppercase;
    }
    .lang-toggle span { transition: opacity 0.2s ease; }

    .wrapper {
      max-width: 1180px;
      margin: 40px auto 60px;
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
      gap: 30px;
      padding: 0 20px 40px;
      position: relative;
      z-index: 2;
    }

    .panel {
      background: radial-gradient(circle at top left,
        rgba(92, 249, 255, 0.12),
        rgba(0, 0, 0, 0.9));
      border-radius: 24px;
      border: 1px solid rgba(120, 255, 200, 0.25);
      padding: 18px 18px 20px;
      box-shadow:
        0 0 25px rgba(0, 0, 0, 0.9),
        0 0 40px rgba(92, 249, 255, 0.12);
      backdrop-filter: blur(10px);
    }

      font-size
