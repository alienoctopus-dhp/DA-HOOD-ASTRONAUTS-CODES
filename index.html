<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Da Hood Codes — QR Engine</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    max-width: 900px;
    width: 100%;
  }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
    font-size: 14px;
  }

  button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    margin-right: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  #qrcode {
    margin-top: 20px;
    background: #fff;
    padding: 10px;
    display: inline-block;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
<div class="container">

  <h1>Da Hood Codes — QR Engine</h1>

  <textarea id="qrText">https://dahoodcodes.com</textarea>

  <br>

  <button onclick="generateQR()">Generate</button>
  <button onclick="resetQR()">Reset</button>
  <button onclick="downloadPNG()">Download PNG</button>

  <div id="qrcode"></div>

</div>

<script>
let qr;

function generateQR() {
  const text = document.getElementById("qrText").value;
  const box = document.getElementById("qrcode");
  box.innerHTML = "";

  qr = new QRCode(box, {
    text: text,
    width: 256,
    height: 256,
    correctLevel: QRCode.CorrectLevel.H
  });
}

function resetQR() {
  document.getElementById("qrText").value = "https://dahoodcodes.com";
  generateQR();
}

function downloadPNG() {
  const canvas = document.querySelector("#qrcode canvas");
  if (!canvas) return;

  const link = document.createElement("a");
  link.download = "qr.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

generateQR();
</script>

</body>
</html>
